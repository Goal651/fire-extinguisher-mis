services:

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/gateway:/app
      - ./services/shared:/app/shared          # ../../shared from /app/src/ = /app/shared ✓
      - gateway_nm:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store/v11
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      EXTINGUISHER_SERVICE_URL: http://extinguisher-service:3002
      ADMIN_SERVICE_URL: http://admin-service:3003
      REPORT_SERVICE_URL: http://report-service:3004
      PNPM_STORE_DIR: /root/.local/share/pnpm/store/v11
      NODE_PATH: /app/node_modules

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/auth-service:/app
      - ./services/shared:/app/shared
      - auth_nm:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store/v11
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/fire_extinguisher_db
      PNPM_STORE_DIR: /root/.local/share/pnpm/store/v11
      NODE_PATH: /app/node_modules

  extinguisher-service:
    build:
      context: ./services/extinguisher-service
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/extinguisher-service:/app
      - ./services/shared:/app/shared
      - extinguisher_nm:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store/v11
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: 3002
      MONGODB_URI: mongodb://mongo:27017/fire_extinguisher_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PNPM_STORE_DIR: /root/.local/share/pnpm/store/v11
      NODE_PATH: /app/node_modules

  admin-service:
    build:
      context: ./services/admin-service
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/admin-service:/app
      - ./services/shared:/app/shared
      - admin_nm:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store/v11
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: 3003
      MONGODB_URI: mongodb://mongo:27017/fire_extinguisher_db
      PNPM_STORE_DIR: /root/.local/share/pnpm/store/v11
      NODE_PATH: /app/node_modules

  report-service:
    build:
      context: ./services/report-service
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/report-service:/app
      - ./services/shared:/app/shared
      - report_nm:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store/v11
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: 3004
      MONGODB_URI: mongodb://mongo:27017/fire_extinguisher_db
      PNPM_STORE_DIR: /root/.local/share/pnpm/store/v11
      NODE_PATH: /app/node_modules

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/notification-service:/app
      - ./services/shared:/app/shared
      - notification_nm:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store/v11
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: 3005
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PNPM_STORE_DIR: /root/.local/share/pnpm/store/v11
      NODE_PATH: /app/node_modules

volumes:
  gateway_nm:
  auth_nm:
  extinguisher_nm:
  admin_nm:
  report_nm:
  notification_nm:
  pnpm_store:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/hacker/.local/share/pnpm/store/v11
