version: "3.9"

# Dev override — mounts host source + node_modules, runs nodemon/ts-node directly.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Before first run, install deps on your host:
#   cd services/gateway && pnpm install
#   cd services/auth-service && pnpm install
#   cd services/extinguisher-service && pnpm install
#   cd services/admin-service && pnpm install
#   cd services/report-service && pnpm install
#   cd services/notification-service && pnpm install

services:

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/gateway:/app
      - ./services/shared:/app/shared           # shared folder visible inside container
      - ./services/gateway/node_modules:/app/node_modules
    environment:
      NODE_ENV: development

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/auth-service:/app
      - ./services/shared:/app/shared
      - ./services/auth-service/node_modules:/app/node_modules
    environment:
      NODE_ENV: development

  extinguisher-service:
    build:
      context: ./services/extinguisher-service
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/extinguisher-service:/app
      - ./services/shared:/app/shared
      - ./services/extinguisher-service/node_modules:/app/node_modules
    environment:
      NODE_ENV: development

  admin-service:
    build:
      context: ./services/admin-service
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/admin-service:/app
      - ./services/shared:/app/shared
      - ./services/admin-service/node_modules:/app/node_modules
    environment:
      NODE_ENV: development

  report-service:
    build:
      context: ./services/report-service
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/report-service:/app
      - ./services/shared:/app/shared
      - ./services/report-service/node_modules:/app/node_modules
    environment:
      NODE_ENV: development

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/notification-service:/app
      - ./services/shared:/app/shared
      - ./services/notification-service/node_modules:/app/node_modules
    environment:
      NODE_ENV: development
