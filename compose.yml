services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/extinguisher
    depends_on:
      - mongo
  
  mongo:
    image: mongo:7.0
    ports:
      - "6000:27017"
    volumes:
      - mongo-data:/data/db
    

volumes:
  mongo-data: